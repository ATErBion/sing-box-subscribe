<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>sing-box 配置生成</title>
    <style>
        body { display: flex; justify-content: center; padding-top: 50px; font-family: sans-serif; background: #f2f2f2; }
        .container { width: 90%; max-width: 600px; background: white; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 150px; display: block; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <form id="gen-form" method="POST" action="/generate_config">
            <textarea name="subscription_links" placeholder="在此直接粘贴订阅链接..." required></textarea>
            <select name="template_index">
                {% for option in template_options %}<option value="{{ loop.index - 1 }}">{{ option }}</option>{% endfor %}
            </select>
            <button type="submit">生成配置</button>
        </form>
        <pre id="output"></pre>
    </div>

    <script>
        document.getElementById('gen-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(e.target.action, { method: 'POST', body: new FormData(e.target) });
            document.getElementById('output').textContent = await res.text();
        };
    </script>
</body>
</html>
