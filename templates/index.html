<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing-box 订阅配置复写工具</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; --text-color: #1e293b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        .card { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #0f172a; margin-top: 0; font-size: 1.5rem; }
        
        input, select, button { width: 100%; margin: 12px 0; padding: 14px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
        button { background-color: var(--primary-color); color: white; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        
        #result-box { margin-top: 25px; padding: 20px; background: #f1f5f9; border-radius: 10px; display: none; }
        #final-link { font-size: 0.85rem; word-break: break-all; cursor: pointer; color: #be185d; padding: 12px; border: 1px dashed #cbd5e1; background: white; border-radius: 6px; margin: 10px 0; }
        #qrcode { display: block; margin: 15px auto; background: white; padding: 5px; border-radius: 8px; }
        
        .instruction { font-size: 0.85rem; color: #475569; background: #fffbeb; padding: 15px; border-radius: 8px; margin-top: 25px; line-height: 1.6; border-left: 4px solid #f59e0b; }
        .template-hint { font-size: 0.75rem; color: #64748b; text-align: center; margin-top: -5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sing-box 订阅复写</h2>
    
    <input type="text" id="sub-url" placeholder="请粘贴机场订阅链接 (http/https)..." required>
    
    <select id="template-index">
        {% for option in template_options %}
        <option value="{{ loop.index }}">{{ option }}</option>
        {% endfor %}
    </select>
    <div class="template-hint">💡 建议：追求省心请选带 “2” 的自动测速/负载均衡模板。</div>
    
    <button onclick="generateLink()">生成复写地址</button>

    <div id="result-box">
        <p style="font-weight: 600; margin: 0 0 8px 0; font-size: 0.9rem;">✅ 转换成功：</p>
        <div id="final-link" onclick="copyText()" title="点击复制"></div>
        <canvas id="qrcode"></canvas>
        <p style="text-align: center; font-size: 0.75rem; color: #64748b; margin: 0;">点击上方链接复制，或扫码添加至软件</p>
    </div>

    <div class="instruction">
        <strong>配置说明：</strong>
        <ul style="padding-left: 18px; margin: 8px 0 0 0;">
            <li>粘贴您的订阅链接，选择对应模板并生成。</li>
            <li><strong>groups_rule_set_tun.json：</strong> 标准模式，支持 TUN 虚拟网卡，节点需手动切换。</li>
            <li><strong>groups_rule_set_tun2.json：</strong> 增强模式，集成自动测速（Url-test），更适合日常挂机。</li>
        </ul>
    </div>
</div>



<script>
    function generateLink() {
        const subUrl = document.getElementById('sub-url').value.trim();
        const fileIndex = document.getElementById('template-index').value;
        if (!subUrl) { alert("请输入订阅链接后再试"); return; }

        const finalLink = `https://sb.10101122.xyz/config/${subUrl}&flag=sing-box&file=${fileIndex}`;
        
        document.getElementById('final-link').textContent = finalLink;
        document.getElementById('result-box').style.display = 'block';
        
        QRCode.toCanvas(document.getElementById('qrcode'), finalLink, { width: 160, margin: 2 }, (err) => {
            if (err) console.error(err);
        });
    }

    function copyText() {
        const text = document.getElementById('final-link').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert("链接已成功复制到剪贴板！");
        });
    }
</script>
</body>
</html>
